{% extends 'base.html' %}

{% block sidebar %}{% endblock %}

{% block maincontent %}
<div class="auth-wrapper d-flex align-items-center justify-content-center flex-column" style="min-height: 100vh; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); width: 100vw; position: absolute; top:0; left:0; z-index: 9999;">
  <style>
    body { overflow-x: hidden; }
    .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        padding: 40px;
    }
    .auth-title {
        font-weight: 700;
        color: #2c3e50;
        letter-spacing: -0.5px;
    }
  </style>
  <div class="container d-flex align-items-center justify-content-center">
      {% block content %}{% endblock content %}
  </div>
</div>
{% endblock %}
