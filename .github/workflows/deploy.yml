name: Deploy to EC2 Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment script via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        request_pty: true
        script: |
          set -euo pipefail
          cd /home/ec2-user/lms2/LMS
          git remote set-url origin https://github.com/dev0918/LMS.git
          git fetch origin main
          git reset --hard origin/main
          echo "Deployed commit: $(git rev-parse --short HEAD)"
          . venv/bin/activate
          pip install -r requirements.txt
          # Load production environment variables safely
          set -a
          source .env.main
          set +a
          python manage.py check
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          # Stop old gunicorn process for production (no suffix needed)
          sudo pkill -f "gunicorn.*config.wsgi" | grep -v uat | grep -v develop || true
          # Start gunicorn for production on port 8000
          sudo bash -c 'cd /home/ec2-user/lms2/LMS && . venv/bin/activate && \
            gunicorn config.wsgi:application \
            --bind 127.0.0.1:8000 \
            --workers 4 \
            --timeout 120 \
            --access-logfile /var/log/gunicorn/access.log \
            --error-logfile /var/log/gunicorn/error.log \
            --daemon'
          sleep 2
          echo "Gunicorn started on port 8000 (Production)"
          sudo systemctl daemon-reload
          sudo systemctl restart nginx
          sudo systemctl is-active --quiet nginx
          echo "--- Nginx status ---"
          sudo systemctl --no-pager --full status nginx | sed -n '1,20p'
          # Smoke test for production environment
          LOCAL_CODE=$(curl -sS -H "Host: 98.92.14.139" http://127.0.0.1:8000/ -o /tmp/lms_home.html -w "%{http_code}")
          if [ "$LOCAL_CODE" -ge 400 ]; then
            echo "Smoke test failed: app returned HTTP $LOCAL_CODE"
            echo "--- gunicorn production log (tail) ---"
            sudo tail -n 120 /var/log/gunicorn/error.log || true
            echo "--- nginx error log (tail) ---"
            sudo tail -n 120 /var/log/nginx/error.log || true
            exit 1
          fi

    - name: Public endpoint smoke test (Production)
      run: |
        PUBLIC_CODE=$(curl -sS http://98.92.14.139/ -o /tmp/public_home.html -w "%{http_code}")
        if [ "$PUBLIC_CODE" -ge 400 ]; then
          echo "Public smoke test failed: endpoint returned HTTP $PUBLIC_CODE"
          exit 1
        fi
        echo "✓ Production deployment successful. Endpoint: http://98.92.14.139/"

