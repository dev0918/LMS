name: Deploy to EC2 Next

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment script via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        request_pty: true
        script: |
          set -e
          cd /home/ec2-user/lms2/LMS
          git fetch origin main
          git reset --hard origin/main
          echo "Deployed commit: $(git rev-parse --short HEAD)"
          . venv/bin/activate
          python - <<'PY'
          import os
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'config.settings')
          import django
          django.setup()
          from django.conf import settings
          print('ALLOW_ALL_HOSTS=', getattr(settings, 'ALLOW_ALL_HOSTS', None))
          print('ALLOWED_HOSTS=', settings.ALLOWED_HOSTS)
          print('CSRF_TRUSTED_ORIGINS=', getattr(settings, 'CSRF_TRUSTED_ORIGINS', []))
          PY
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          sudo systemctl daemon-reload
          sudo systemctl restart gunicorn
          sudo systemctl restart nginx
          sudo systemctl --no-pager --full status gunicorn | head -n 20
          sudo systemctl --no-pager --full status nginx | head -n 20
          LOCAL_CODE=$(curl -sS -H "Host: 98.92.14.139" http://127.0.0.1/ -o /tmp/lms_home.html -w "%{http_code}")
          if [ "$LOCAL_CODE" -ge 400 ]; then
            echo "Smoke test failed: app returned HTTP $LOCAL_CODE"
            exit 1
          fi

    - name: Public endpoint smoke test
      run: |
        PUBLIC_CODE=$(curl -sS http://98.92.14.139/ -o /tmp/public_home.html -w "%{http_code}")
        if [ "$PUBLIC_CODE" -ge 400 ]; then
          echo "Public smoke test failed: endpoint returned HTTP $PUBLIC_CODE"
          exit 1
        fi

