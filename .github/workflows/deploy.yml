name: Deploy to EC2 Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment script via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        request_pty: true
        script: |
          set -euo pipefail
          cd /home/ec2-user/lms2/LMS
          git remote set-url origin https://github.com/dev0918/LMS.git
          git fetch origin main
          git reset --hard origin/main
          echo "Deployed commit: $(git rev-parse --short HEAD)"
          . venv/bin/activate
          pip install -r requirements.txt
          # Load production environment variables safely
          set -a
          source .env.main
          set +a
          python manage.py check
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          echo "Starting gunicorn on port 8000..."
          cd /home/ec2-user/lms2/LMS
          . venv/bin/activate
          
          # Verify gunicorn is installed
          echo "Checking if gunicorn is installed..."
          which gunicorn || { echo "Gunicorn not found!"; pip show gunicorn; exit 1; }
          
          # Kill any existing process on port 8000
          fuser -k 8000/tcp 2>/dev/null || true
          sleep 1
          
          # Create user-writable log directory in app folder
          LOG_DIR="/home/ec2-user/lms2/LMS/logs"
          mkdir -p "$LOG_DIR" || true
          
          # Start gunicorn as daemon with user-writable logs
          echo "Starting gunicorn daemon..."
          nohup gunicorn config.wsgi:application \
            --bind 127.0.0.1:8000 \
            --workers 2 \
            --timeout 60 \
            --access-logfile "$LOG_DIR/access.log" \
            --error-logfile "$LOG_DIR/error.log" \
            --daemon \
            --pid /tmp/gunicorn.pid > "$LOG_DIR/startup.log" 2>&1 &
          
          # Wait for daemon startup
          sleep 4
          
          # Verify gunicorn process is running
          echo "Checking gunicorn process..."
          if ! ps aux | grep '[g]unicorn' > /dev/null 2>&1; then
            echo "ERROR: Gunicorn process not found!"
            echo "=== Gunicorn startup log ==="
            cat "$LOG_DIR/startup.log" || echo "No startup log"
            echo "=== Gunicorn error log ==="
            tail -n 50 "$LOG_DIR/error.log" || echo "No error log found"
            exit 1
          fi
          
          # Verify port 8000 is listening
          echo "Checking if port 8000 is listening..."
          if ! ss -tlnp 2>/dev/null | grep 8000 || ! netstat -tlnp 2>/dev/null | grep 8000; then
            echo "ERROR: Port 8000 not listening!"
            tail -n 50 "$LOG_DIR/error.log" || true
            exit 1
          fi
          echo "✓ Gunicorn started successfully"
          
          echo "Reloading nginx..."
          sudo systemctl reload nginx || sudo systemctl restart nginx
          sleep 2
          
          # Smoke test for production environment (with timeout)
          echo "Running smoke test on localhost:8000..."
          LOCAL_CODE=$(timeout 10 curl -sS -H "Host: 98.92.14.139" http://127.0.0.1:8000/ -o /tmp/lms_home.html -w "%{http_code}" || echo "000")
          echo "Local smoke test returned: $LOCAL_CODE"
          if [ "$LOCAL_CODE" -ge 400 ] || [ "$LOCAL_CODE" = "000" ]; then
            echo "Smoke test failed: app returned HTTP $LOCAL_CODE"
            echo "Response content:"
            cat /tmp/lms_home.html || true
            echo ""
            echo "=== Gunicorn error log ==="
            tail -n 100 "$LOG_DIR/error.log" || echo "No error log found"
            exit 1
          fi
          echo "✓ Local smoke test passed"

    - name: Public endpoint smoke test (Production)
      run: |
        echo "Running public smoke test on http://98.92.14.139/..."
        PUBLIC_CODE=$(timeout 10 curl -sS http://98.92.14.139/ -o /tmp/public_home.html -w "%{http_code}" || echo "000")
        echo "Public endpoint returned: $PUBLIC_CODE"
        if [ "$PUBLIC_CODE" -ge 400 ] || [ "$PUBLIC_CODE" = "000" ]; then
          echo "Public smoke test failed: endpoint returned HTTP $PUBLIC_CODE"
          exit 1
        fi
        echo "✓ Production deployment successful. Endpoint: http://98.92.14.139/"

