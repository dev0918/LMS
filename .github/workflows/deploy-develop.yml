name: Deploy to EC2 Develop

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Execute deployment script via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        request_pty: true
        script: |
          set -euo pipefail
          cd /home/ec2-user/lms2/LMS
          git remote set-url origin https://github.com/dev0918/LMS.git
          git fetch origin develop
          git reset --hard origin/develop
          echo "Deployed commit: $(git rev-parse --short HEAD)"
          . venv/bin/activate
          pip install -r requirements.txt
          # Load develop environment variables safely
          set -a
          source .env.develop
          set +a
          python manage.py check
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          echo "Stopping old gunicorn processes..."
          sudo pkill -9 -f "gunicorn.*port.*8002" || true
          sleep 1
          # Start gunicorn for develop on port 8002
          echo "Starting gunicorn on port 8002..."
          sudo bash -c 'cd /home/ec2-user/lms2/LMS && . venv/bin/activate && \
            gunicorn config.wsgi:application \
            --bind 127.0.0.1:8002 \
            --workers 2 \
            --timeout 60 \
            --access-logfile /var/log/gunicorn/develop-access.log \
            --error-logfile /var/log/gunicorn/develop-error.log \
            --daemon' &
          sleep 3
          echo "Reloading nginx..."
          sudo systemctl reload nginx || sudo systemctl restart nginx
          sleep 1
          # Smoke test for develop environment (with timeout)
          echo "Running smoke test on localhost:8002..."
          LOCAL_CODE=$(timeout 10 curl -sS -H "Host: 98.92.14.139" http://127.0.0.1:8002/ -o /tmp/lms_develop.html -w "%{http_code}" || echo "000")
          echo "Local smoke test returned: $LOCAL_CODE"
          if [ "$LOCAL_CODE" -ge 400 ] || [ "$LOCAL_CODE" = "000" ]; then
            echo "Smoke test failed: app returned HTTP $LOCAL_CODE"
            sudo tail -n 50 /var/log/gunicorn/develop-error.log || true
            exit 1
          fi

    - name: Public endpoint smoke test (Develop)
      run: |
        echo "Running public smoke test on http://98.92.14.139/develop/..."
        PUBLIC_CODE=$(timeout 10 curl -sS http://98.92.14.139/develop/ -o /tmp/public_develop.html -w "%{http_code}" || echo "000")
        echo "Public endpoint returned: $PUBLIC_CODE"
        if [ "$PUBLIC_CODE" -ge 400 ] || [ "$PUBLIC_CODE" = "000" ]; then
          echo "Public smoke test failed: endpoint returned HTTP $PUBLIC_CODE"
          exit 1
        fi
        echo "✓ Develop deployment successful. Endpoint: http://98.92.14.139/develop/"
