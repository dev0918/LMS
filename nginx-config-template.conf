# Nginx Configuration for Multi-Environment LMS
# This configuration routes different paths to different gunicorn instances
# Deploy this to: /etc/nginx/available-sites/lms or similar location
# Then: sudo ln -s /etc/nginx/available-sites/lms /etc/nginx/enabled-sites/lms

upstream gunicorn_main {
    server 127.0.0.1:8000;
}

upstream gunicorn_uat {
    server 127.0.0.1:8001;
}

upstream gunicorn_develop {
    server 127.0.0.1:8002;
}

server {
    listen 80;
    server_name 98.92.14.139;
    
    # Logging
    access_log /var/log/nginx/lms-access.log;
    error_log /var/log/nginx/lms-error.log warn;

    # Max upload size for file uploads (adjust as needed)
    client_max_body_size 50M;

    # Production (main) - root path
    location / {
        proxy_pass http://gunicorn_main;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # UAT environment - /uat path
    location /uat/ {
        proxy_pass http://gunicorn_uat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header SCRIPT_NAME /uat;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Develop environment - /develop path
    location /develop/ {
        proxy_pass http://gunicorn_develop;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header SCRIPT_NAME /develop;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files for production
    location /static/ {
        alias /home/ec2-user/lms2/LMS/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files for UAT
    location /uat/static/ {
        alias /home/ec2-user/lms2/LMS/staticfiles-uat/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files for Develop
    location /develop/static/ {
        alias /home/ec2-user/lms2/LMS/staticfiles-develop/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files for production
    location /media/ {
        alias /home/ec2-user/lms2/LMS/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Media files for UAT
    location /uat/media/ {
        alias /home/ec2-user/lms2/LMS/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Media files for Develop
    location /develop/media/ {
        alias /home/ec2-user/lms2/LMS/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
}
